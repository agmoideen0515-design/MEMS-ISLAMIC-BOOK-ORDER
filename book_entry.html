<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMS Trikaripur - Islamic Book Order</title>
    <style>
        :root { --primary: #1a5d1a; --secondary: #28a745; --bg: #f4f9f4; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 15px; }
        .form-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: auto; border-top: 8px solid var(--primary); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #333; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        .checkbox-group { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px dashed #ccc; }
    </style>
</head>
<body>
<div class="form-card">
    <h2>MEMS TRIKARIPUR</h2>
    <p style="text-align:center; margin-top:0;">ഇസ്ലാമിക് ബുക്ക് ഓർഡർ ഫോം</p>
    <form id="bookForm">
        <label>Name of Student (English Only)</label>
        <input type="text" name="name" required placeholder="Type Name" oninput="this.value = this.value.replace(/[^A-Za-z ]/g, '');">
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Class</label>
                <select name="sClass" id="sClass" required onchange="updateBooks()">
                    <option value="">Select</option>
                    <option value="3">Class 3</option><option value="4">Class 4</option>
                    <option value="5">Class 5</option><option value="6">Class 6</option>
                    <option value="7">Class 7</option><option value="8">Class 8</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>Division</label>
                <input type="text" name="division" required placeholder="A/B/C">
            </div>
        </div>

        <div class="checkbox-group">
            <p style="margin:0 0 10px 0; font-weight:bold;">ആവശ്യമുള്ളവ തിരഞ്ഞെടുക്കുക:</p>
            <div style="display:flex; align-items:center; margin-bottom:10px;">
                <input type="checkbox" name="textbook" value="Yes" style="width:auto; margin-right:10px;">
                <label id="txtLabel" style="margin:0">Textbook</label>
            </div>
            <div style="display:flex; align-items:center;">
                <input type="checkbox" name="workbook" value="Yes" style="width:auto; margin-right:10px;">
                <label id="wrkLabel" style="margin:0">Workbook</label>
            </div>
        </div>
        <button type="submit" class="btn" id="submitBtn">Submit Order</button>
    </form>
</div>

<script>
    const scriptURL = 'നിങ്ങളുടെ_പുതിയ_WEB_APP_URL';
    const txtNames = {
        "3": "3rd MASAA-ILUL FIQH / ULOOMUDDEEN", 
        "4": "4th MASAA-ILUL FIQH / ULOOMUDDEEN", 
        "5": "5th MASAA-ILUL FIQH / ULOOMUDDEEN",
        "6": "6th MASAA-ILUL FIQH / ULOOMUDDEEN", 
        "7": "7th MASAA-ILUL FIQH / ULOOMUDDEEN", 
        "8": "8th DUROOS / FIQHUL ISLAM / THAZKIYA"
    };

    function updateBooks() {
        const cls = document.getElementById('sClass').value;
        if(cls) {
            document.getElementById('txtLabel').innerText = txtNames[cls];
            document.getElementById('wrkLabel').innerText = cls + "-ാം ക്ലാസ്സ് വർക്ക് ബുക്ക്";
        }
    }
  document.getElementById('bookForm').addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('submitBtn').innerHTML = "അയച്ചുകൊണ്ടിരിക്കുന്നു...";
        fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
        .then(() => { alert("വിജയകരമായി രജിസ്റ്റർ ചെയ്തു!"); location.reload(); });
    });
</script>
</body>
</html>
