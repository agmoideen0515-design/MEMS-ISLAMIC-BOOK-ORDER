<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMS Islamic Book Order</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; max-width: 450px; margin: auto; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-top: 8px solid #1a5d1a; }
        h2 { text-align: center; color: #1a5d1a; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .book-section { background: #f9fff9; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #1a5d1a; }
        .btn { background: #1a5d1a; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .checkbox-row { display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; background: white; padding: 8px; border-radius: 5px; border: 1px solid #eee; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <h2>MEMS TRIKARIPUR</h2>
    <form id="orderForm">
        <label>Student Name</label>
        <input type="text" name="name" required placeholder="Enter Full Name">
        
        <label>Class</label>
        <select name="sClass" id="sClass" required onchange="updateBooks()">
            <option value="">Select Class</option>
            <option value="3">Class 3</option>
            <option value="4">Class 4</option>
            <option value="5">Class 5</option>
            <option value="6">Class 6</option>
            <option value="7">Class 7</option>
            <option value="8">Class 8</option>
        </select>

        <label>Division</label>
        <select name="division" required>
            <option value="">Select Division</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="G">G</option>
        </select>

        <div id="bookArea" class="book-section" style="display:none;">
            <p style="margin-top:0; font-weight:bold; color:#1a5d1a;" id="bookHeader">പുസ്തകങ്ങൾ തിരഞ്ഞെടുക്കുക:</p>
            <div id="bookList"></div>
        </div>

        <button type="submit" class="btn" id="submitBtn">Submit Order</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxEW73RJmwXWyxCTuTA6IOokQWOMncxwkj3vz5sFVx9SfBtSuGqW7odSr2JeNyJPRlX/exec';
    
    const booksData = {
        "3": ["AHKAMU THAJVEED", "THAJVEED (WORK)", "MASAA-ILUL FIQH", "FIQH (WORK)", "ULOOMUDDEEN", "ULOOM (WORK)"],
        "4": ["AHKAMU THAJVEED", "THAJVEED (WORK)", "MASAA-ILUL FIQH", "FIQH (WORK)", "ULOOMUDDEEN", "ULOOM (WORK)"],
        "5": ["AHKAMU THAJVEED", "THAJVEED (WORK)", "MASAA-ILUL FIQH", "FIQH (WORK)", "ULOOMUDDEEN", "ULOOM (WORK)"],
        "6": ["AHKAMU THAJVEED", "THAJVEED (WORK)", "MASAA-ILUL FIQH", "FIQH (WORK)", "ULOOMUDDEEN", "ULOOM (WORK)"],
        "7": ["AHKAMU THAJVEED", "THAJVEED (WORK)", "MASAA-ILUL FIQH", "FIQH (WORK)", "ULOOMUDDEEN", "ULOOM (WORK)"],
        "8": ["DUROOS", "DUROOS (Work)", "FIQHUL ISLAM", "FIQH (Work)", "THAZKIYA", "THAZKIYA (Work)"]
    };

    function getSuffix(n) {
        if (n == 3) return "rd";
        return "th";
    }

    function updateBooks() {
        const cls = document.getElementById('sClass').value;
        const area = document.getElementById('bookArea');
        const listDiv = document.getElementById('bookList');
        const header = document.getElementById('bookHeader');
        listDiv.innerHTML = '';
        
        if(cls && booksData[cls]) {
            header.innerText = `Class ${cls} - പുസ്തകങ്ങൾ തിരഞ്ഞെടുക്കുക:`;
            const suffix = getSuffix(cls);
            booksData[cls].forEach(book => {
                const label = document.createElement('label');
                label.className = 'checkbox-row';
                // ഇവിടെയാണ് കൃത്യമായ ക്ലാസ്സ് നമ്പർ ചേർക്കുന്നത് (ഉദാ: 3rd, 8th)
                label.innerHTML = `<input type="checkbox" name="books" value="${cls}${suffix} ${book}"> <span>${book}</span>`;
                listDiv.appendChild(label);
            });
            area.style.display = 'block';
        } else {
            area.style.display = 'none';
        }
    }

    document.getElementById('orderForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const selectedBooks = Array.from(document.querySelectorAll('input[name="books"]:checked')).map(cb => cb.value);
        
        if(selectedBooks.length === 0) {
            alert("ദയവായി ഒരു പുസ്തകമെങ്കിലും തിരഞ്ഞെടുക്കുക.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "അയച്ചുകൊണ്ടിരിക്കുന്നു...";
        
        const formData = new FormData(e.target);
        formData.delete('books'); 
        formData.append('selectedBooks', selectedBooks.join(', ')); 

        fetch(scriptURL, { method: 'POST', body: formData})
        .then(res => {
            alert("ഓർഡർ വിജയകരമായി സബ്മിറ്റ് ചെയ്തു!");
            location.reload();
        })
        .catch(err => {
            alert("Error! ഒന്നുകൂടി ശ്രമിക്കുക.");
            btn.disabled = false;
            btn.innerText = "Submit Order";
        });
    });
</script>
</body>
</html>
